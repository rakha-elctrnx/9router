services:
  9router:
    build: .                    # <— build dari folder lokal
    container_name: 9router
    restart: always
    ports:
      - "20128:20128"
    volumes:
      - 9router-data:/app/data
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      PORT: "20128"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      HEADROOM_URL: http://headroom:8787
      SEARXNG_URL: http://searxng:8080
    depends_on:
      - headroom
      - searxng

  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom
    restart: always
    ports:
      - "8787:8787"

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: always
    ports:
      - "8888:8080"
    env_file:
      - .env
    volumes:
      - searxng-data:/etc/searxng
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro

volumes:
  9router-data:
    name: 9router-data
  searxng-data:
    name: searxng-data
